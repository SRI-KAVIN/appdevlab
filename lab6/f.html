<!DOCTYPE html>
<html>
<head>
<title>Binary Search Using Recursion</title>
</head>
<body>

<h2>Binary Search Using Recursion</h2>

<input type="text" id="arrayInput" placeholder="Enter sorted numbers (comma separated)">
<input type="number" id="targetInput" placeholder="Enter number to search">
<button onclick="searchNumber()">Search</button>

<p id="result"></p>

<script>
function binarySearch(arr, left, right, target){
    if(left > right) return -1;
    let mid = Math.floor((left + right) / 2);
    if(arr[mid] == target) return mid;
    if(arr[mid] > target) return binarySearch(arr, left, mid - 1, target);
    return binarySearch(arr, mid + 1, right, target);
}

function searchNumber(){
    let arr = document.getElementById("arrayInput").value.split(",").map(Number);
    let target = parseInt(document.getElementById("targetInput").value);
    let index = binarySearch(arr, 0, arr.length - 1, target);
    document.getElementById("result").innerText = index == -1 ? "Element not found" : "Element found at index " + index;
}
</script>

</body>
</html>
