<!DOCTYPE html>
<html>
<head>
<title>Palindrome Check</title>
</head>
<body>

<h2>Palindrome Check Using Recursion</h2>

<input type="text" id="textInput" placeholder="Enter a string">
<button onclick="checkPalindrome()">Check</button>

<p id="result"></p>

<script>
function isPalindrome(str, start, end){
    if(start >= end) return true;
    if(str[start] !== str[end]) return false;
    return isPalindrome(str, start + 1, end - 1);
}

function checkPalindrome(){
    let str = document.getElementById("textInput").value;
    let res = isPalindrome(str, 0, str.length - 1);
    document.getElementById("result").innerText = res ? "Palindrome" : "Not a Palindrome";
}
</script>

</body>
</html>
